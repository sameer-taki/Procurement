name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install flake8 pytest
      - name: Lint (syntax / undefined-name gate)
        run: flake8 . --select=E9,F63,F7,F82 --show-source
      - name: Migrations upgrade + downgrade (real DDL, not create_all)
        # Tests build the schema via create_all, so a broken migration or a
        # model<->migration drift stays invisible to pytest. Exercise the full
        # chain up, all the way back down, and up again on a scratch SQLite DB.
        env:
          DATABASE_URL: "sqlite:////tmp/ci-migrations.db"
          SECRET_KEY: "ci-migration-check-key-0123456789-0123456789"
          RUN_MIGRATIONS_ON_STARTUP: "false"
          APP_ENV: "test"
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head
      - name: Tests
        env:
          SEED_HISTORY: "false"
        run: pytest -q
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
