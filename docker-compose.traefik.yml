# docker-compose.traefik.yml  —  Golden on-prem host (Portainer deploys THIS file)
# App name: procurement   Host: procurement.gml.com.fj
# Conventions baked in (do not remove): joins shared external "web" network;
# traefik.docker.network=web; NO published ports; FastAPI plain HTTP on 8000, Traefik does TLS.
# Required Portainer env: APP_HOST, DB_PASSWORD, SECRET_KEY, ADMIN_USERNAME, ADMIN_PASSWORD
# Optional (set when their phase lands): BC_*, KIWIPLAN_DSN, ACCURA_DSN, GRAPH_*, ENTRA_*

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: "${APP_ENV:-production}"
      DATABASE_URL: "postgresql+psycopg://fmp:${DB_PASSWORD:?}@db:5432/fmp"
      SECRET_KEY: "${SECRET_KEY:?}"
      FIRST_ADMIN_USERNAME: "${ADMIN_USERNAME:?}"
      FIRST_ADMIN_PASSWORD: "${ADMIN_PASSWORD:?}"
      FIRST_ADMIN_NAME: "Administrator"
      # --- integrations (optional until their phase; safe to leave blank) ---
      # Business Central: connection + auth
      BC_BASE_URL: "${BC_BASE_URL:-}"
      BC_COMPANY: "${BC_COMPANY:-}"
      BC_USERNAME: "${BC_USERNAME:-}"
      BC_PASSWORD: "${BC_PASSWORD:-}"
      BC_AUTH: "${BC_AUTH:-ntlm}"
      BC_VERIFY_TLS: "${BC_VERIFY_TLS:-true}"
      # BC OData entity names (override per tenant; defaults are standard BC V4)
      BC_ITEMS_ENTITY: "${BC_ITEMS_ENTITY:-Items}"
      BC_PO_ENTITY: "${BC_PO_ENTITY:-PurchaseOrders}"
      BC_PO_LINES_ENTITY: "${BC_PO_LINES_ENTITY:-PurchaseOrderLines}"
      BC_RECEIPT_ENTITY: "${BC_RECEIPT_ENTITY:-PurchRcptHeaders}"
      BC_INVOICE_ENTITY: "${BC_INVOICE_ENTITY:-PurchInvHeaders}"
      BC_USAGE_ENTITY: "${BC_USAGE_ENTITY:-ItemLedgerEntries}"
      BC_VENDORS_ENTITY: "${BC_VENDORS_ENTITY:-Vendors}"
      BC_PURCHASE_PRICES_ENTITY: "${BC_PURCHASE_PRICES_ENTITY:-Purchase_Prices}"
      BC_RECEIPT_POST_ACTION: "${BC_RECEIPT_POST_ACTION:-Microsoft.NAV.Post}"
      # BC paper-planning mapping (usage entry types, grade/deckle, crosswalk)
      BC_USAGE_ENTRY_TYPES: "${BC_USAGE_ENTRY_TYPES:-Negative Adjmt.,Consumption}"
      BC_GRADE_FIELD: "${BC_GRADE_FIELD:-}"
      BC_DECKLE_FIELD: "${BC_DECKLE_FIELD:-}"
      BC_PAPER_SKU_REGEX: "${BC_PAPER_SKU_REGEX:-}"
      BC_REORDER_POINT_FIELD: "${BC_REORDER_POINT_FIELD:-Reorder_Point}"
      BC_LEAD_TIME_FIELD: "${BC_LEAD_TIME_FIELD:-Lead_Time_Calculation}"
      BC_REPLENISHMENT_FIELD: "${BC_REPLENISHMENT_FIELD:-}"
      CROSSWALK_MODE: "${CROSSWALK_MODE:-sku}"
      BC_KIWIPLAN_REF_FIELD: "${BC_KIWIPLAN_REF_FIELD:-}"
      BC_ACCURA_REF_FIELD: "${BC_ACCURA_REF_FIELD:-}"
      # Kiwiplan / Accura (live stock needs BOTH the DSN and the *_STOCK_SQL query)
      KIWIPLAN_DSN: "${KIWIPLAN_DSN:-}"
      KIWIPLAN_STOCK_SQL: "${KIWIPLAN_STOCK_SQL:-}"
      ACCURA_DSN: "${ACCURA_DSN:-}"
      ACCURA_STOCK_SQL: "${ACCURA_STOCK_SQL:-}"
      # Azure SQL analytics warehouse (Phase 5 push)
      AZURE_SQL_DSN: "${AZURE_SQL_DSN:-}"
      # Schedulers (leave default unless tuning cadence)
      STOCK_REFRESH_ENABLED: "${STOCK_REFRESH_ENABLED:-true}"
      STOCK_REFRESH_SECONDS: "${STOCK_REFRESH_SECONDS:-1800}"
      OUTBOX_PROCESS_ENABLED: "${OUTBOX_PROCESS_ENABLED:-true}"
      OUTBOX_PROCESS_SECONDS: "${OUTBOX_PROCESS_SECONDS:-60}"
      USAGE_IMPORT_ENABLED: "${USAGE_IMPORT_ENABLED:-true}"
      USAGE_IMPORT_SECONDS: "${USAGE_IMPORT_SECONDS:-86400}"
      # M365 Graph mailer
      GRAPH_TENANT_ID: "${GRAPH_TENANT_ID:-}"
      GRAPH_CLIENT_ID: "${GRAPH_CLIENT_ID:-}"
      GRAPH_CLIENT_SECRET: "${GRAPH_CLIENT_SECRET:-}"
      GRAPH_SENDER: "${GRAPH_SENDER:-no-reply@golden.com.fj}"
      # Entra ID SSO
      ENTRA_TENANT_ID: "${ENTRA_TENANT_ID:-}"
      ENTRA_CLIENT_ID: "${ENTRA_CLIENT_ID:-}"
      ENTRA_CLIENT_SECRET: "${ENTRA_CLIENT_SECRET:-}"
      ENTRA_REDIRECT_URI: "${ENTRA_REDIRECT_URI:-}"
      ENTRA_ROLE_CLAIM: "${ENTRA_ROLE_CLAIM:-roles}"
    networks:
      - web
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.procurement.rule=Host(`${APP_HOST:?}`)"
      - "traefik.http.routers.procurement.entrypoints=websecure"
      - "traefik.http.routers.procurement.tls=true"
      - "traefik.http.services.procurement.loadbalancer.server.port=8000"
    mem_limit: 1g
    cpus: "1.5"
    healthcheck:
      # /health probes the DB (503 when it can't SELECT 1), so this surfaces a
      # wedged app to Docker/Portainer instead of it looking up while broken.
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fmp
      POSTGRES_PASSWORD: "${DB_PASSWORD:?}"
      POSTGRES_DB: fmp
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fmp -d fmp"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 1g
    cpus: "1.0"
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  db-backup:
    image: prodrigestivill/postgres-backup-local:16
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: fmp
      POSTGRES_USER: fmp
      POSTGRES_PASSWORD: "${DB_PASSWORD:?}"
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: "${BACKUP_KEEP_DAYS:-7}"
      BACKUP_KEEP_WEEKS: "${BACKUP_KEEP_WEEKS:-4}"
      BACKUP_KEEP_MONTHS: "${BACKUP_KEEP_MONTHS:-6}"
      POSTGRES_EXTRA_OPTS: "-Z6"
      HEALTHCHECK_PORT: "8080"
    volumes:
      # Default keeps backups beside the stack; set BACKUP_PATH to an absolute
      # host path OUTSIDE Portainer's GitOps checkout (ideally a different disk
      # or an NFS/SMB mount to a LAN file server) so a host-disk loss doesn't
      # take pgdata AND its backups. Restore procedure: DEPLOY.md §Backups.
      - "${BACKUP_PATH:-./backups}:/backups"
    mem_limit: 512m
    cpus: "0.5"
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

volumes:
  pgdata:

networks:
  web:
    external: true
  default:
